kind = "web"
previewPath = "/"
title = "NELLOA BANK"
version = "1.0.0"
id = "artifacts/nelloa-bank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20254

[services.development]
run = "pnpm --filter @workspace/nelloa-bank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nelloa-bank", "run", "build" ]
publicDir = "artifacts/nelloa-bank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20254"
BASE_PATH = "/"
